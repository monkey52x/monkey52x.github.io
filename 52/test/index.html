<!DOCTYPE html>
<html>
<head>
    <title>Определение региона...</title>
    <script>
        async function redirectByLocation() {
            try {
                // Используем бесплатное API для определения страны по IP
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // Проверяем страну (например, 'US' для США, 'UA' для Украины, 'KZ' для Казахстана)
                if (data.country_code === 'US') {
                    window.location.href = "https://google.com"; // Куда кидаем американцев
                } else if (data.country_code === 'UA') {
                    window.location.href = "https://ukr.net";    // Куда кидаем украинцев
                } else {
                    window.location.href = "https://my-main-site.com"; // Всех остальных
                }
            } catch (error) {
                console.error("Ошибка при определении локации:", error);
            }
        }

        // Запускаем функцию сразу при загрузке страницы
        redirectByLocation();
    </script>
</head>
<body>
    <p>Загрузка... Пожалуйста, подождите.</p>
</body>
</html>
